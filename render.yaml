services:
  - type: web
    name: mini-crm-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        sync: false
